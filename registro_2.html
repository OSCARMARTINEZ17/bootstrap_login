<!DOCTYPE html>

<html lang="es">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Registro</title>
        <link rel="icon" href="multimedia_2/balon.png" type="image/png">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>

    <body class="d-flex flex-column min-vh-100">

        <div class="container-fluid flex-grow-1">

            <div class="row h-100">

                <div class="col-md-6 d-flex justify-content-center align-items-center">
                    
                    <div class="card p-4 shadow" style="width: 400px;">
                        
                        <h3 class="text-center mb-4">Registro</h3>

                        <form>
                            <div class="mb-3">
                                <label class="form-label">Nombre completo</label>
                                <input type="text" class="form-control" placeholder="Ingresa tu nombre">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control" placeholder="Ingresa tu correo">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" class="form-control" placeholder="Crea una contraseña">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Confirmar contraseña</label>
                                <input type="password" class="form-control" placeholder="Repite la contraseña">
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Registrarse</button>

                            <p class="mt-3 text-center">
                                ¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a>
                            </p>
                        </form>

                    </div>

                </div>

                <div class="col-md-6 d-flex justify-content-center align-items-center bg-light">
                    <img src="multimedia_2/7f2583dd35dd07b8158495e326c6fde3.jpg"
                        class="img-fluid w-75 object-fit-contain rounded shadow">
                </div>

            </div>
            
        </div>


        <footer class="bg-dark text-white text-center p-3">
            2026 - Mi página
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    </body>
</html>
