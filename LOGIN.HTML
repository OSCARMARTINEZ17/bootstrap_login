<!DOCTYPE html>

<html lang="es">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
        <link rel="icon" href="../bootstrap_login/multimedia/balon.png" type="image/png">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>

    <body class="d-flex flex-column min-vh-100">

        <div class="container-fluid flex-grow-1">

            <div class="row h-100">
                
                <div class="col-md-6 d-flex justify-content-center align-items-center bg-light">
                    <img src="../bootstrap_login/multimedia/HYUGA.jpg" class="img-fluid w-75">
                </div>

                <div class="col-md-6 d-flex flex-column justify-content-center align-items-center">

                    <h2 class="mb-4">Inicio de sesión</h2>
                        
                    <form style="width: 80%; max-width: 400px;">
                        <div class="mb-3 mt-3">
                            <label for="email" class="form-label">Email:</label>
                            <input type="email" class="form-control" id="email" placeholder="Enter email">
                        </div>

                        <div class="mb-3">
                            <label for="pwd" class="form-label">Password:</label>
                            <input type="password" class="form-control" id="pwd" placeholder="Enter password">
                        </div>

                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox">
                            <label class="form-check-label">
                                Remember me
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary">Submit</button>

                        <p class="mt-3 text-center">
                            ¿No tienes sesión? <a href="registro.html">Regístrate</a>
                        </p>

                    </form>
                </div>

            </div>

        </div>

        <footer class="bg-dark text-white text-center p-3">
            2026 - Mi página
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    </body>
</html>
